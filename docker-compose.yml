services:
  db:
    image: postgres:16
    container_name: emberc_db
    environment:
      POSTGRES_DB: emberc_db
      POSTGRES_USER: emberc_user
      POSTGRES_PASSWORD: emberc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
